<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="utf-8" />
    <title>תצוגה מקומית — שאלות מנורמלות</title>
    <link rel="stylesheet" href="/css/site.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        .demo-wrap { max-width: 960px; margin: 0 auto; padding: 16px; position: relative; z-index: 1; }
        .demo-title { color: #eee; text-align: center; margin: 12px 0 8px; font-size: 1.1rem; }
        .demo-nav {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            margin: 16px 0; flex-wrap: wrap;
        }
        .demo-nav button {
            border: 1px solid #555; background: #2a2a2a; color: #eee;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 1rem;
        }
        .demo-nav button:disabled { opacity: 0.4; cursor: not-allowed; }
        .demo-nav .counter { color: #ccc; min-width: 7rem; text-align: center; font-size: 1rem; }
        .demo-nav select {
            background: #2a2a2a; color: #eee; border: 1px solid #555;
            border-radius: 8px; padding: 8px 12px; max-width: min(100%, 320px);
        }
        .demo-tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
        .demo-tabs button {
            border: 1px solid #555; background: #2a2a2a; color: #eee;
            padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 1rem;
        }
        .demo-tabs button.active { background: #4a7c59; border-color: #6fcf97; }
        .demo-panel { display: none; }
        .demo-panel.active { display: block; }
        .demo-label { color: #aaa; text-align: center; margin-bottom: 8px; font-size: 0.85rem; word-break: break-all; }
        .demo-meta { color: #888; text-align: center; font-size: 0.75rem; margin-top: 12px; }
        .demo-progress { color: #9ab; text-align: center; font-size: 0.8rem; margin-bottom: 8px; }
    </style>
</head>
<body>
<img src="/assets/background.gif" alt="" class="background-gif" loading="lazy" aria-hidden="true" />

<div class="demo-wrap">
    <h1 class="demo-title" id="demo-title">תצוגה מקומית — שאלות מנורמלות</h1>

    <p class="demo-progress" id="demo-progress" hidden></p>

    <div class="demo-nav" id="demo-nav" hidden>
        <button type="button" id="btn-prev" aria-label="שאלה קודמת">◀ הקודמת</button>
        <span class="counter" id="nav-counter">—</span>
        <button type="button" id="btn-next" aria-label="שאלה הבאה">הבאה ▶</button>
        <select id="nav-select" aria-label="בחר שאלה"></select>
    </div>

    <div class="demo-tabs">
        <button type="button" class="active" data-panel="after">אחרי (חדש)</button>
        <button type="button" data-panel="before">לפני (מקור)</button>
    </div>

    <div id="panel-after" class="demo-panel active">
        <p class="demo-label" id="label-after">—</p>
        <div class="quiz-container">
            <img src="" alt="שאלה" id="main-question-image" class="quiz-main-image" />
            <div class="answers" id="answers-grid"></div>
        </div>
        <p class="demo-meta" id="meta-after"></p>
    </div>

    <div id="panel-before" class="demo-panel">
        <p class="demo-label" id="label-before">—</p>
        <div class="quiz-container">
            <img src="" alt="שאלה" id="before-question-image" class="quiz-main-image" />
            <div class="answers" id="before-answers-grid"></div>
        </div>
    </div>
</div>

<script src="/js/quiz-viewport.js"></script>
<script>
(function () {
    let questions = [];
    let idx = 0;
    let panel = "after";

    const els = {
        nav: document.getElementById("demo-nav"),
        counter: document.getElementById("nav-counter"),
        select: document.getElementById("nav-select"),
        prev: document.getElementById("btn-prev"),
        next: document.getElementById("btn-next"),
        mainImg: document.getElementById("main-question-image"),
        beforeImg: document.getElementById("before-question-image"),
        answers: document.getElementById("answers-grid"),
        beforeAnswers: document.getElementById("before-answers-grid"),
        labelAfter: document.getElementById("label-after"),
        labelBefore: document.getElementById("label-before"),
        metaAfter: document.getElementById("meta-after"),
        title: document.getElementById("demo-title"),
        progress: document.getElementById("demo-progress"),
    };

    function buildAnswers(grid, urls) {
        grid.innerHTML = "";
        for (const url of urls) {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "answer-btn";
            const img = document.createElement("img");
            img.src = url;
            img.alt = "תשובה";
            img.loading = "lazy";
            btn.appendChild(img);
            grid.appendChild(btn);
        }
    }

    function showQuestion(i) {
        if (!questions.length) return;
        idx = Math.max(0, Math.min(i, questions.length - 1));
        const q = questions[idx];
        els.counter.textContent = `${q.label} / ${questions.length}`;
        els.select.value = String(idx);
        els.prev.disabled = idx <= 0;
        els.next.disabled = idx >= questions.length - 1;

        els.mainImg.src = q.question;
        els.beforeImg.src = q.beforeQuestion;
        buildAnswers(els.answers, q.answers);
        buildAnswers(els.beforeAnswers, q.beforeAnswers);

        els.labelAfter.textContent = `חדש — ${q.id}`;
        els.labelBefore.textContent = `מקור — ${q.id}`;

        const onLoad = () => {
            const qi = els.mainImg;
            const meta = qi.naturalWidth && qi.naturalHeight
                ? `שאלה: ${qi.naturalWidth}×${qi.naturalHeight}px`
                : "";
            const firstAns = els.answers.querySelector("img");
            const am = firstAns?.naturalWidth && firstAns?.naturalHeight
                ? ` · תשובה: ${firstAns.naturalWidth}×${firstAns.naturalHeight}px`
                : "";
            els.metaAfter.textContent = meta + am;
            window.QuizViewport?.scheduleQuizViewportAdjust?.();
        };
        els.mainImg.onload = onLoad;
        if (els.mainImg.complete) onLoad();
    }

    document.querySelectorAll(".demo-tabs button").forEach((btn) => {
        btn.addEventListener("click", () => {
            panel = btn.dataset.panel;
            document.querySelectorAll(".demo-tabs button").forEach((b) => b.classList.remove("active"));
            document.querySelectorAll(".demo-panel").forEach((p) => p.classList.remove("active"));
            btn.classList.add("active");
            document.getElementById("panel-" + panel).classList.add("active");
            window.QuizViewport?.scheduleQuizViewportAdjust?.();
        });
    });

    els.prev.addEventListener("click", () => showQuestion(idx - 1));
    els.next.addEventListener("click", () => showQuestion(idx + 1));
    els.select.addEventListener("change", () => showQuestion(Number(els.select.value)));

    document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight") showQuestion(idx - 1);
        if (e.key === "ArrowLeft") showQuestion(idx + 1);
    });

    fetch("manifest.json")
        .then((r) => r.json())
        .then((data) => {
            questions = data.questions || [];
            if (!questions.length) throw new Error("empty manifest");
            els.title.textContent = `תצוגה מקומית — ${data.ready ?? questions.length} שאלות מנורמלות`;
            if (data.total_groups) {
                els.progress.hidden = false;
                els.progress.textContent =
                    `מוכנות ${data.ready ?? questions.length} מתוך ${data.total_groups} (חי: /media/original/)`;
            }
            els.nav.hidden = false;
            els.select.innerHTML = questions
                .map((q, i) => `<option value="${i}">${q.label}</option>`)
                .join("");
            showQuestion(0);
            window.QuizViewport?.bindQuizViewportHandlers?.();
        })
        .catch((err) => {
            els.labelAfter.textContent = "שגיאה: הרץ build-demo.py אחרי rewrite";
            console.error(err);
        });
})();
</script>
</body>
</html>
